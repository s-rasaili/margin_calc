<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Margin Calculator</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #eef2f7;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.card {
  width: 420px;
  background: #fff;
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h2 {
  text-align: center;
  margin-bottom: 15px;
}

label {
  font-size: 13px;
  margin-top: 10px;
  display: block;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

.result-box {
  margin-top: 15px;
  padding: 12px;
  background: #f5f7fb;
  border-radius: 10px;
  text-align: center;
}

.highlight {
  font-size: 20px;
  font-weight: bold;
  color: #4f8cff;
}

.reset-btn {
  width: 100%;
  margin-top: 12px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #ff5c5c;
  color: #fff;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="card">
<h2>Smart Margin Calculator</h2>

<label>Display Price (with GST)</label>
<input type="number" id="displayPrice">

<label>GST %</label>
<input type="number" id="gst">

<label>Seller Price</label>
<input type="number" id="sellerPrice">

<label>NRV</label>
<input type="number" id="nrv">

<label>Margin %</label>
<input type="number" id="margin">

<div class="result-box">
  <div>BSA</div>
  <div class="highlight" id="bsa">0.00</div>
</div>

<button class="reset-btn" onclick="resetCalc()">Reset</button>

</div>

<script>
const displayPrice = document.getElementById("displayPrice");
const gst = document.getElementById("gst");
const seller = document.getElementById("sellerPrice");
const nrv = document.getElementById("nrv");
const margin = document.getElementById("margin");
const bsaText = document.getElementById("bsa");

let active = null;

const inputs = [displayPrice, gst, seller, nrv, margin];

inputs.forEach(el => {
  el.addEventListener("input", () => {
    active = el.id;
    calculate();
  });
});

function getVal(el) {
  return el.value === "" ? null : parseFloat(el.value);
}

function setVal(el, val) {
  if (active !== el.id && val !== null && !isNaN(val)) {
    el.value = val.toFixed(2);
  }
}

function calculate() {
  let dp = getVal(displayPrice);
  let gstVal = getVal(gst);
  let sp = getVal(seller);
  let nrvVal = getVal(nrv);
  let marginVal = getVal(margin);

  if (!gstVal) gstVal = 0;
  const gstFactor = 1 + gstVal / 100;

  // Display → Seller
  if (active === "displayPrice" && dp && gstVal) {
    sp = dp / gstFactor;
    setVal(seller, sp);
  }

  // Seller → Display
  if (active === "sellerPrice" && sp && gstVal) {
    dp = sp * gstFactor;
    setVal(displayPrice, dp);
  }

  if (!sp) {
    bsaText.innerText = "0.00";
    return;
  }

  const onePercent = sp * 0.01;
  let bsa = null;

  // NRV → Margin
  if (active === "nrv" && nrvVal !== null) {
    bsa = nrvVal - onePercent;
    marginVal = ((sp - bsa) / sp) * 100;
    setVal(margin, marginVal);
  }

  // Margin → NRV
  else if (active === "margin" && marginVal !== null) {
    bsa = sp * (1 - marginVal / 100);
    nrvVal = bsa + onePercent;
    setVal(nrv, nrvVal);
  }

  // Seller + NRV
  else if (sp && nrvVal !== null) {
    bsa = nrvVal - onePercent;
    marginVal = ((sp - bsa) / sp) * 100;
    setVal(margin, marginVal);
  }

  // Seller + Margin
  else if (sp && marginVal !== null) {
    bsa = sp * (1 - marginVal / 100);
    nrvVal = bsa + onePercent;
    setVal(nrv, nrvVal);
  }

  if (bsa !== null) {
    bsaText.innerText = bsa.toFixed(2);
  }

  // Final sync Display Price
  if (sp && gstVal) {
    dp = sp * gstFactor;
    setVal(displayPrice, dp);
  }
}

// RESET
function resetCalc() {
  inputs.forEach(el => el.value = "");
  bsaText.innerText = "0.00";
  active = null;
}
</script>

</body>
</html>
