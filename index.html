<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Margin Calculator</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f4f6fb;
}

.container {
  max-width: 1000px;
  margin: 40px auto;
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  overflow: hidden;
}

.header {
  background: linear-gradient(90deg, #5b4dff, #7a6bff);
  color: #fff;
  padding: 16px 20px;
  display: flex;
  justify-content: space-between;
}

.body {
  display: flex;
  gap: 20px;
  padding: 20px;
}

.left { flex: 1; }

.right {
  flex: 1;
  background: #f9fafc;
  border-radius: 12px;
  padding: 20px;
}

.row {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

input.invalid {
  border-color: red;
  background: #fff5f5;
}

.result-box {
  margin-top: 10px;
  padding: 15px;
  background: #eef1ff;
  border-radius: 10px;
  text-align: center;
}

.result-box span {
  font-size: 22px;
  font-weight: bold;
  color: #5b4dff;
}

.reset-btn {
  width: 100%;
  margin-top: 12px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #ef4444;
  color: #fff;
  cursor: pointer;
}

.formula-line {
  background: #fff;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  font-size: 13px;
}

.formula-line b {
  color: #5b4dff;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <div>📊 Margin Calculator</div>
  <div>Marketplace Tool</div>
</div>

<div class="body">

<!-- LEFT -->
<div class="left">

<div class="row">
<input type="number" id="displayPrice" placeholder="Display Price">
<input type="number" id="gst" placeholder="GST %">
</div>

<div class="row">
<input type="number" id="sellerPrice" placeholder="Seller Price">
</div>

<div class="row">
<input type="number" id="margin" placeholder="Margin %">
<input type="number" id="nrv" placeholder="NRV">
</div>

<div class="result-box">
BSA<br>
<span id="bsa">0.00</span>
</div>

<button class="reset-btn" onclick="resetCalc()">Reset</button>

</div>

<!-- RIGHT -->
<div class="right">

<h3>Live Results</h3>

<div class="formula-line">
Display = Seller × (1 + GST)<br>
<b id="resDisplay">-</b>
</div>

<div class="formula-line">
Seller = Display ÷ (1 + GST)<br>
<b id="resSeller">-</b>
</div>

<div class="formula-line">
BSA = NRV − 1% of Seller<br>
<b id="resBSA">-</b>
</div>

<div class="formula-line">
Margin % = (Seller − BSA) / Seller × 100<br>
<b id="resMargin">-</b>
</div>

</div>

</div>
</div>

<script>
const displayPrice = document.getElementById("displayPrice");
const gst = document.getElementById("gst");
const seller = document.getElementById("sellerPrice");
const nrv = document.getElementById("nrv");
const margin = document.getElementById("margin");
const bsaText = document.getElementById("bsa");

const resDisplay = document.getElementById("resDisplay");
const resSeller = document.getElementById("resSeller");
const resBSA = document.getElementById("resBSA");
const resMargin = document.getElementById("resMargin");

let active = null;

const inputs = [displayPrice, gst, seller, nrv, margin];

inputs.forEach(el => {
  el.addEventListener("input", () => {
    validate(el);
    active = el.id;
    calculate();
  });
});

function validate(el) {
  if (el.value === "") return el.classList.remove("invalid");

  if (parseFloat(el.value) < 0) {
    el.value = "";
    el.classList.add("invalid");
  } else {
    el.classList.remove("invalid");
  }
}

function val(el) {
  return el.value === "" ? null : parseFloat(el.value);
}

function set(el, value) {
  if (active !== el.id && value !== null && !isNaN(value)) {
    el.value = value.toFixed(2);
  }
}

function calculate() {
  let dp = val(displayPrice);
  let gstVal = val(gst);
  let sp = val(seller);
  let nrvVal = val(nrv);
  let marginVal = val(margin);

  if (gstVal === null) gstVal = 0;

  const gstFactor = 1 + gstVal / 100;

  if (dp !== null && active !== "sellerPrice") {
    sp = dp / gstFactor;
    set(seller, sp);
  }

  if (sp !== null && active !== "displayPrice") {
    dp = sp * gstFactor;
    set(displayPrice, dp);
  }

  if (nrvVal !== null && marginVal !== null && active !== "sellerPrice") {
    sp = nrvVal / (1 - marginVal / 100 + 0.01);
    set(seller, sp);
  }

  if (sp === null) return;

  const onePercent = sp * 0.01;
  let bsa = null;

  if (nrvVal !== null) {
    bsa = nrvVal - onePercent;
    marginVal = ((sp - bsa) / sp) * 100;
    set(margin, marginVal);
  }

  if (marginVal !== null && nrvVal === null) {
    bsa = sp * (1 - marginVal / 100);
    nrvVal = bsa + onePercent;
    set(nrv, nrvVal);
  }

  if (bsa !== null) {
    bsaText.innerText = bsa.toFixed(2);
  }

  // LIVE PANEL
  resDisplay.innerText = dp ? dp.toFixed(2) : "-";
  resSeller.innerText = sp ? sp.toFixed(2) : "-";
  resBSA.innerText = bsa ? bsa.toFixed(2) : "-";
  resMargin.innerText = marginVal ? marginVal.toFixed(2) + "%" : "-";
}

function resetCalc() {
  inputs.forEach(el => {
    el.value = "";
    el.classList.remove("invalid");
  });

  bsaText.innerText = "0.00";
  resDisplay.innerText = "-";
  resSeller.innerText = "-";
  resBSA.innerText = "-";
  resMargin.innerText = "-";
}
</script>

</body>
</html>
